<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Style</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-[2000px] bg-gradient-to-b from-[#1E1F5A] to-[#5865F2]">

<header id="header" class="w-full overflow-x-hidden bg-transparent px-[clamp(1rem, 5vw, 2rem)] py-4 flex items-center justify-between md:justify-space-between sticky top-0 z-50 transition-colors duration-300">
  <div class="flex items-center space-x-4 px-4"> ">
    <img src="https://cdn.discordapp.com/icons/123456789012345678/abcdef1234567890.png"
         alt="Logo" 
         class="w-10 h-10 rounded-full">
    <h1 class="text-[20px] text-white font-bold ">Discord</h1>
  </div>

  <nav class="hidden sm:flex sm:text-sm sm:space-x-3  md:flex md:text-base lg:flex lg:text-lg space-x-6">
    <a href="#" class="text-white hover:text-gray-300">Download</a>
    <a href="#" class="text-white hover:text-gray-300">Nitro</a>
    <a href="#" class="text-white hover:text-gray-300">Discover</a>
    <a href="#" class="text-white hover:text-gray-300">Safety</a>
    <a href="#" class="text-white hover:text-gray-300">Suport</a>
    <a href="#" class="text-white hover:text-gray-300">Blog</a>
    <a href="#" class="text-white hover:text-gray-300">Careers</a>

  </nav>

 
  <div class="flex px-6 items-center justify-between  space-x-3">
    <button class="text-black font-bold border-[1px] px-3 py-2 rounded-[20px] bg-white">Log in</button>
    <button id="menu" class="text-white font-bold px-3 py-2 rounded-[10px] bg-black sm:hidden md:hidden lg:hidden">=</button>
  </div>
</header>

<script>
const header = document.getElementById('header');
window.addEventListener('scroll', () => {
  if (window.scrollY > 50) {
    header.classList.add('bg-[#5865F2]', 'shadow-lg');
    header.classList.remove('bg-transparent');
  } else {
    header.classList.remove('bg-[#5865F2]', 'shadow-lg');
    header.classList.add('bg-transparent');
  }
});
const menuButton = document.getElementById('menu');
menuButton.addEventListener('click', () => {
  menuButton.classList.toggle('rotate-90');

});
</script>
</body>
</html>
