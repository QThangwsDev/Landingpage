<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollytelling GSAP - Plane Effect</title>
    
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Smooth scroll container */
        html.lenis {
            height: auto;
        }

        section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* SECTION 1: SCALE */
        .section-1 {
            background: #111;
        }

        .hero-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-img {
            width: 60%;
            height: 60%;
            object-fit: cover;
            border-radius: 20px;
            will-change: transform;
        }

        /* SECTION 2: PLANE & SWAP */
        .section-2 {
            background: #000;
        }

        .content-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .bg-active {
            opacity: 1;
        }

        .plane {
            position: absolute;
            bottom: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px; /* Độ rộng của máy bay */
            z-index: 10;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
        }

        .heading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8vw;
            white-space: nowrap;
            z-index: 5;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -2px;
        }

        /* SECTION 3: FOOTER */
        .section-3 {
            background: white;
            color: black;
        }

        h1 { font-size: 3rem; }
    </style>
</head>
<body>

    <section class="section-1">
        <div class="hero-container">
            <img src="https://images.unsplash.com/photo-1464013778555-8e723c2f01f8?q=80&w=2070" class="hero-img" alt="Landscape">
        </div>
        <h2 style="position:absolute; bottom: 10%;">Cuộn để bắt đầu</h2>
    </section>

    <section class="section-2">
        <div class="content-wrapper">
            <img src="https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=1974" class="bg-image bg-1 bg-active" alt="Sky 1">
            <img src="https://images.unsplash.com/photo-1436491865332-7a61a109c055?q=80&w=2070" class="bg-image bg-2" alt="Sky 2">
            
            <h1 class="heading">LUXURY JET</h1>
            
            <img src="https://pngimg.com/d/plane_PNG101210.png" class="plane" alt="Plane">
        </div>
    </section>

    <section class="section-3">
        <h1>TIẾP TỤC KHÁM PHÁ</h1>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script>
        // 1. Khởi tạo Lenis (Smooth Scroll)
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 2. Đăng ký ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);

        // 3. Animation Section 1: Scale Image
        gsap.to(".hero-img", {
            scale: 2.5,
            scrollTrigger: {
                trigger: ".section-1",
                start: "top top",
                end: "bottom top",
                scrub: true,
                pin: true
            }
        });

        // 4. Animation Section 2: Pin & Plane Movement & Image Swap
        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".section-2",
                start: "top top",
                end: "+=3000", // Cuộn 3000px để kết thúc timeline
                scrub: 1,
                pin: true,
            }
        });

        // Bắt đầu diễn hoạt
        tl.to(".plane", {
            bottom: "120%", // Máy bay bay vọt lên trên màn hình
            scale: 1.5,
            duration: 5
        })
        .to(".heading", {
            y: -150,
            opacity: 0,
            duration: 2
        }, 0) // Chạy cùng lúc với máy bay (offset 0)
        
        // Đoạn Swap ảnh: Khi máy bay bay được một khoảng (giây thứ 2.5 trên timeline)
        .to(".bg-1", {
            opacity: 0,
            duration: 1
        }, 2) 
        .to(".bg-2", {
            opacity: 1,
            duration: 1
        }, 2); // Swap cùng lúc ở giây thứ 2

    </script>
</body>
</html>
