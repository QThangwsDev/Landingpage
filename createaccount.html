<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CreateAcount form</title>
</head>
<body>
    
  <div class="w-full bg-blue-500 aspect-square">
    Ô này luôn luôn là hình vuông!
</div>
    <script>
        const db = [];
        const form = document.querySelector('form');
        const inputs = document.querySelectorAll('input');
        form.addEventListener("submit", () => {
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            if(!username || !email || !password || !confirmPassword) {
                alert("Please fill in all fields!");
                return;
            }

            if (!/\S+@\S+\.\S+/.test(email)) {
                alert("Please enter a valid email!");
                return;
            }

            if(password.length < 6) {
                alert("Password must be at least 6 characters!");
                return;
            }
            // kiem tra password co day du 1 chu cai, 1 chu so va 1 ky tu dac biet khong
            if (!/(?=.*[a-zA-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,}/.test(password)) {
                const messerror = document.getElementById("messerror");
                messerror.textContent = "Password must contain at least one letter, one number, and one special character!";
                return;
            }
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // check tung input de co chua ma lenh js hay xss gi khong
            for (let input of inputs) {
                if (/<script>|<\/script>|<img|<iframe|<object|<embed|<svg|onerror=|onload=/.test(input.value)) {
                    alert("Invalid input detected!");
                    return;
                }
                }
            
            db.push({ username, email, password });
            alert("Account created successfully!");
            inputs.forEach(input => input.value = ""); // Clear the forms
            console.log(db);

        });

    </script>
</body>
</html>
